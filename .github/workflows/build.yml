name: Build VSFilterBE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # BaseClasses aus MPC-BE laden (zuverlässige Quelle)
    - name: Download MPC-BE BaseClasses
      run: |
        curl -L -o mpcbe.zip https://github.com/Aleksoid1978/MPC-BE/archive/refs/heads/master.zip
        tar -xf mpcbe.zip
        if not exist external\BaseClasses mkdir external\BaseClasses
        xcopy MPC-BE-master\src\filters\BaseClasses external\BaseClasses /E /I /Y

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Build x86
      run: msbuild VSFilterBE.sln /p:Configuration=Release /p:Platform=x86

    - name: Build x64
      run: msbuild VSFilterBE.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VSFilterBE-Binaries
        path: |
          bin/Release/x86/VSFilterBE.dll
          bin/Release/x64/VSFilterBE.dll
