name: Build VSFilterBE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download DirectShow BaseClasses
      run: |
        curl -L -o baseclasses.zip https://github.com/ShiftMediaProject/DirectShowBaseClasses/archive/refs/heads/master.zip
        tar -xf baseclasses.zip
        mkdir external\BaseClasses
        xcopy DirectShowBaseClasses-master\BaseClasses external\BaseClasses /E /I /Y

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Build x86
      run: msbuild VSFilterBE.sln /p:Configuration=Release /p:Platform=x86

    - name: Build x64
      run: msbuild VSFilterBE.sln /p:Configuration=Release /p:Platform=x64

    - name: Create registration scripts
      run: |
        echo regsvr32 "VSFilterBE_x64.dll" > register_x64.cmd
        echo regsvr32 /u "VSFilterBE_x64.dll" > unregister_x64.cmd

        echo %windir%\SysWOW64\regsvr32 "VSFilterBE_x86.dll" > register_x86.cmd
        echo %windir%\SysWOW64\regsvr32 /u "VSFilterBE_x86.dll" > unregister_x86.cmd

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VSFilterBE-Binaries
        path: |
          bin/Release/x86/*
          bin/Release/x64/*
          register_x86.cmd
          register_x64.cmd
          unregister_x86.cmd
          unregister_x64.cmd
