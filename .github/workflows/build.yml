name: Build VSFilterBE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Build Win32 (x86)
      run: msbuild VSFilterBE.sln /p:Configuration=Release /p:Platform=Win32

    - name: Build x64
      run: msbuild VSFilterBE.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VSFilterBE-Binaries
        path: |
          bin/Release/Win32/*
          bin/Release/x64/*
