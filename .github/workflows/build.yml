name: Build VSFilterBE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository (with submodules)
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Build x86
      run: msbuild VSFilterBE.sln /p:Configuration=Release /p:Platform=x86

    - name: Build x64
      run: msbuild VSFilterBE.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VSFilterBE-Binaries
        path: |
          _bin/Filter_x86/VSFilterBE.dll
          _bin/Filter_x64/VSFilterBE.dll
